<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebZan — Websites, die bleiben.</title>
  <link rel="icon" type="image/png" href="assets/logo/favicon-32.png">
  <!-- Inter self-hosted — DSGVO-konform -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

  <style>
    /* Self-hosted Inter — replaces Google Fonts CDN */
    @font-face {
      font-family: 'Inter';
      src: url('assets/fonts/inter-400.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('assets/fonts/inter-600.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('assets/fonts/inter-700.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('assets/fonts/inter-900.woff2') format('woff2');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    /* ============================================
       CSS CUSTOM PROPERTIES
    ============================================ */
    :root {
      --accent: #E8B84B;
      --accent-dim: rgba(232, 184, 75, 0.12);
      --accent-glow: rgba(232, 184, 75, 0.25);
      --radius: 4px;
      --radius-lg: 12px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #1A1510;
      --bg2: #221B12;
      --bg3: #2A2118;
      --text: #F5F0E8;
      --muted: #8A8070;
      --border: rgba(232, 184, 75, 0.15);
      --border-sub: rgba(245, 240, 232, 0.08);
      --card-bg: #221B12;
      --nav-solid: rgba(26, 21, 16, 0.88);
      --overlay-bg: #1A1510;
    }

    [data-theme="light"] {
      --bg: #FAFAF8;
      --bg2: #F0EDE6;
      --bg3: #E8E4DB;
      --text: #1A1510;
      --muted: #6A6050;
      --border: rgba(232, 184, 75, 0.3);
      --border-sub: rgba(26, 21, 16, 0.1);
      --card-bg: #F0EDE6;
      --nav-solid: rgba(250, 250, 248, 0.88);
      --overlay-bg: #FAFAF8;
    }

    /* ============================================
       RESET & BASE
    ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: auto;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
      transition: background 0.4s ease, color 0.4s ease;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    ::selection {
      background: var(--accent);
      color: #1A1510;
    }

    /* ============================================
       LAYOUT UTILITIES
    ============================================ */
    .container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 clamp(24px, 5vw, 80px);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
    }

    /* ============================================
       NAV
    ============================================ */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 900;
      padding: 20px 0;
      transition: background 0.4s ease, border-color 0.4s ease, padding 0.3s ease;
      border-bottom: 1px solid transparent;
    }

    .nav.scrolled {
      background: var(--nav-solid);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .nav-logo-img {
      height: 32px;
      width: auto;
      transition: opacity 0.3s ease;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    @media (max-width: 767px) {
      .nav-links {
        display: none;
      }
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      transition: color var(--transition);
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width var(--transition);
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border-sub);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .pill-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border-sub);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color var(--transition);
      position: relative;
      z-index: 1100;
    }

    .hamburger:hover {
      border-color: var(--accent);
    }

    .hamburger span {
      display: block;
      width: 100%;
      height: 1.5px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .hamburger.open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    /* ============================================
       MENU DROPDOWN
    ============================================ */
    .menu-overlay {
      position: fixed;
      top: 68px;
      right: 20px;
      z-index: 1000;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      min-width: 176px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.28), 0 2px 8px rgba(0,0,0,0.18);
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
      transition: background var(--transition), border-color var(--transition);
    }

    .menu-overlay.is-open {
      pointer-events: all;
    }

    .menu-overlay-inner {
      padding: 6px 0;
    }

    .menu-overlay-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 0;
    }

    .menu-overlay-nav a {
      display: block;
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
      letter-spacing: 0.01em;
      padding: 10px 20px;
      transition: color 0.15s ease, background 0.15s ease;
      opacity: 1;
      transform: none;
    }

    .menu-overlay-nav a:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .menu-overlay-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 1;
      transform: none;
      padding: 8px 20px 8px;
      border-top: 1px solid var(--border-sub);
      margin-top: 4px;
    }

    /* ============================================
       HERO
    ============================================ */
    .hero {
      min-height: 100svh;
      display: flex;
      align-items: flex-end;
      padding-top: 120px;
      padding-bottom: clamp(60px, 8vw, 100px);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(232, 184, 75, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    /* Ensure all page sections stack correctly */
    .about, .services, .showcase, .process, .contact, .footer {
      position: relative;
      z-index: 1;
    }

    .hero-inner {
      width: 100%;
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: clamp(32px, 5vw, 80px);
    }

    .hero-text {
      flex: 1 1 55%;
      min-width: 0;
    }

    .hero-wz {
      flex: 0 0 42%;
      height: clamp(280px, 45vw, 520px);
      pointer-events: none;
      align-self: center;
    }

    .hero-wz canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    @media (max-width: 767px) {
      .hero-inner { flex-direction: column; align-items: flex-start; }
      .hero-wz    { display: none; }
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--accent);
    }

    .hero-headline {
      overflow: hidden;
      margin-bottom: 0;
    }

    .headline-line-wrap {
      overflow: hidden;
      display: block;
    }

    .headline-line {
      display: block;
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--text);
      will-change: transform;
      clip-path: inset(0 0 100% 0);
    }

    .headline-line.accent {
      color: var(--accent);
    }

    .hero-sub {
      margin-top: clamp(32px, 4vw, 48px);
      max-width: 480px;
      font-size: clamp(15px, 1.8vw, 18px);
      color: var(--muted);
      line-height: 1.65;
      opacity: 0;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-top: 40px;
      opacity: 0;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: var(--accent);
      color: #1A1510;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all var(--transition);
      will-change: transform;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232, 184, 75, 0.35);
    }

    .btn-primary svg {
      transition: transform var(--transition);
    }

    .btn-primary:hover svg {
      transform: translateX(4px);
    }

    .scroll-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .scroll-line {
      width: 48px;
      height: 1px;
      background: var(--muted);
      position: relative;
      overflow: hidden;
    }

    .scroll-line::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--accent);
      animation: slide-line 2s ease-in-out infinite;
    }

    @keyframes slide-line {
      0% { left: -100%; }
      50% { left: 0%; }
      100% { left: 100%; }
    }

    @media (max-width: 767px) {
      .scroll-indicator {
        display: none;
      }
    }

    /* ============================================
       ABOUT
    ============================================ */
    .about {
      padding: clamp(80px, 12vw, 140px) 0;
      border-top: 1px solid var(--border-sub);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 6vw, 80px);
      align-items: start;
    }

    @media (max-width: 767px) {
      .about-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }

    .about-headline {
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--text);
      opacity: 0;
      transform: translateY(40px);
    }

    .about-text {
      font-size: clamp(15px, 1.6vw, 17px);
      color: var(--muted);
      line-height: 1.75;
      opacity: 0;
      transform: translateY(40px);
    }

    .about-text strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ============================================
       SERVICES
    ============================================ */
    .services {
      padding: clamp(80px, 12vw, 140px) 0;
    }

    .services-header {
      display: flex;
      flex-direction: column;
      margin-bottom: clamp(48px, 6vw, 72px);
    }

    .services-headline {
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--text);
      opacity: 0;
      transform: translateY(40px);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-sub);
      border: 1px solid var(--border-sub);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    @media (max-width: 767px) {
      .services-grid {
        grid-template-columns: 1fr;
      }
    }

    .service-card {
      display: block;
      text-decoration: none;
      background: var(--card-bg);
      padding: clamp(32px, 4vw, 48px);
      position: relative;
      cursor: pointer;
      opacity: 0;
      transform: translateY(60px);
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    .service-card::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .service-card:hover::after {
      opacity: 1;
    }

    .service-card:hover {
      box-shadow: 0 0 40px var(--accent-glow);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .service-arrow { font-size: 14px; color: var(--accent); display: block; margin-top: 12px; opacity: 0; transition: opacity var(--transition), transform var(--transition); transform: translateX(-4px); }
    .service-card:hover .service-arrow { opacity: 1; transform: translateX(0); }

    .service-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 20px;
      display: block;
    }

    .service-title {
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .service-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ============================================
       PROJECTS
    ============================================ */
    .projects {
      padding: clamp(80px, 12vw, 140px) 0;
      border-top: 1px solid var(--border-sub);
    }

    .projects-header {
      margin-bottom: clamp(48px, 6vw, 72px);
    }

    .projects-headline {
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(40px);
    }

    .projects-note {
      font-size: 13px;
      color: var(--muted);
      opacity: 0;
      transform: translateY(20px);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 900px) {
      .projects-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 580px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
    }

    .project-card {
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--border-sub);
      opacity: 0;
      transform: translateY(50px);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .project-card:hover {
      border-color: var(--border);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
    }

    .project-thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      position: relative;
      overflow: hidden;
    }

    /* Project thumbnail 1: Restaurant Orbit — deep amber/black radial */
    .project-thumb-1 {
      background:
        radial-gradient(ellipse at 30% 60%, rgba(232, 184, 75, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(180, 100, 20, 0.25) 0%, transparent 50%),
        linear-gradient(135deg, #1A1510 0%, #2A2010 50%, #1A1510 100%);
    }

    .project-thumb-1::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border: 1px solid rgba(232, 184, 75, 0.4);
      border-radius: 50%;
      box-shadow:
        0 0 0 24px rgba(232, 184, 75, 0.06),
        0 0 0 48px rgba(232, 184, 75, 0.03);
    }

    .project-thumb-1::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: rgba(232, 184, 75, 0.6);
      border-radius: 50%;
      filter: blur(2px);
    }

    /* Project thumbnail 2: Studio Bold — editorial grid */
    .project-thumb-2 {
      background: linear-gradient(160deg, #221B12 0%, #2E2415 100%);
    }

    .project-thumb-2::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(232, 184, 75, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232, 184, 75, 0.08) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .project-thumb-2::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent) 40%, transparent 40%);
    }

    /* Project thumbnail 3: Product Launch — bold diagonal */
    .project-thumb-3 {
      background: linear-gradient(160deg, #1A1510 0%, #251D10 60%, #2A1F08 100%);
      overflow: hidden;
    }

    .project-thumb-3::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -10%;
      width: 70%;
      height: 200%;
      background: linear-gradient(
        180deg,
        rgba(232, 184, 75, 0.15) 0%,
        rgba(232, 184, 75, 0.08) 50%,
        transparent 100%
      );
      transform: rotate(-20deg);
    }

    .project-thumb-3::after {
      content: '';
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border: 2px solid rgba(232, 184, 75, 0.5);
      border-radius: var(--radius);
      transform: rotate(15deg);
    }

    [data-theme="light"] .project-thumb-1 {
      background:
        radial-gradient(ellipse at 30% 60%, rgba(232, 184, 75, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(180, 100, 20, 0.15) 0%, transparent 50%),
        linear-gradient(135deg, #E8E4DB 0%, #DDD8CC 50%, #E8E4DB 100%);
    }

    [data-theme="light"] .project-thumb-2 {
      background: linear-gradient(160deg, #E8E4DB 0%, #DDD8CC 100%);
    }

    [data-theme="light"] .project-thumb-3 {
      background: linear-gradient(160deg, #EEEAE2 0%, #E4DDD0 60%, #DED8C8 100%);
    }

    .project-body {
      padding: 24px;
    }

    .project-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(232, 184, 75, 0.2);
      padding: 4px 10px;
      border-radius: 100px;
      margin-bottom: 12px;
    }

    .project-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .project-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ============================================
       PROCESS
    ============================================ */
    .process {

    /* ==========================================
       THREE.JS wZ MARK — full-page background
    ========================================== */
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      if (typeof THREE === 'undefined') return;

      var TWEAKS = {
        theme:     localStorage.getItem('theme') || 'light',
        mode:      'flow',
        speed:     0.22,
        thickness: 0.075,
        glow:      0.55,
        particles: 55,
        trail:     2,
        rotation:  0.42
      };

      /* ---- BUILD wZ STROKES ---- */
      function buildStrokes() {
        var wPts = [
          new THREE.Vector3(-2.70,  0.78, 0),
          new THREE.Vector3(-2.05, -0.95, 0),
          new THREE.Vector3(-1.30,  0.55, 0),
          new THREE.Vector3(-0.55, -0.95, 0),
          new THREE.Vector3( 0.10,  0.40, 0)
        ];
        var wCurve = new THREE.CatmullRomCurve3(wPts, false, 'catmullrom', 0.35);
        var Zl = 0.45, Zr = 2.65, Zt = 1.05, Zb = -1.05;
        var zPath = new THREE.CurvePath();
        zPath.add(new THREE.LineCurve3(new THREE.Vector3(Zl, Zt, 0), new THREE.Vector3(Zr, Zt, 0)));
        zPath.add(new THREE.LineCurve3(new THREE.Vector3(Zr, Zt, 0), new THREE.Vector3(Zl, Zb, 0)));
        zPath.add(new THREE.LineCurve3(new THREE.Vector3(Zl, Zb, 0), new THREE.Vector3(Zr, Zb, 0)));
        return [
          { name:'w', curve: wCurve, len: wCurve.getLength(), segs: 400 },
          { name:'z', curve: zPath,  len: zPath.getLength(),  segs: 240 }
        ];
      }
      var strokes = buildStrokes();
      var totalLen = strokes.reduce(function(s, x) { return s + x.len; }, 0);
      strokes.reduce(function(acc, s) {
        s.gStart = acc / totalLen;
        s.gEnd   = (acc + s.len) / totalLen;
        return acc + s.len;
      }, 0);

      /* ---- SCENE ---- */
      var stageEl = document.getElementById('stage');
      var scene   = new THREE.Scene();
      var camera  = new THREE.PerspectiveCamera(36, 1, 0.1, 100);
      camera.position.set(0.3, 0, 8.6);

      var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      stageEl.appendChild(renderer.domElement);

      var group = new THREE.Group();
      scene.add(group);

      var amb  = new THREE.AmbientLight(0xffffff, 0.45);
      scene.add(amb);
      var key  = new THREE.PointLight(0xffd58a, 1.6, 30);
      key.position.set(3, 3, 5); scene.add(key);
      var rim  = new THREE.PointLight(0xb88040, 0.9, 30);
      rim.position.set(-5, -2, 3); scene.add(rim);
      var travel = new THREE.PointLight(0xffe0a0, 1.4, 4.5);
      scene.add(travel);

      /* ---- PALETTES ---- */
      function palette() {
        var dark = TWEAKS.theme === 'dark';
        return {
          primary:  new THREE.Color(dark ? '#F0CC85' : '#B8842F'),
          deep:     new THREE.Color(dark ? '#8a5a20' : '#7a4a14'),
          glow:     new THREE.Color(dark ? '#FFD884' : '#E6A845'),
          particle: new THREE.Color(dark ? '#FFE6B0' : '#9a6a22')
        };
      }

      var parts = [], particles = null, strokeBundles = [];

      function disposeAll() {
        parts.forEach(function(p) {
          if (p.geometry) p.geometry.dispose();
          if (p.material) {
            if (Array.isArray(p.material)) p.material.forEach(function(m) { m.dispose(); });
            else p.material.dispose();
          }
          group.remove(p);
        });
        parts = []; strokeBundles = []; particles = null;
      }

      function buildStrokeBundle(stroke) {
        var pal   = palette();
        var thick = TWEAKS.thickness;
        var bundle = { stroke: stroke, ghosts: [] };

        var mainGeo = new THREE.TubeGeometry(stroke.curve, stroke.segs, thick, 18, false);
        var mainMat = new THREE.MeshStandardMaterial({
          color: pal.primary, roughness: 0.30, metalness: 0.35,
          emissive: pal.deep, emissiveIntensity: 0.35 * TWEAKS.glow
        });
        bundle.main = new THREE.Mesh(mainGeo, mainMat);
        group.add(bundle.main); parts.push(bundle.main);

        var haloGeo = new THREE.TubeGeometry(stroke.curve, Math.max(180, stroke.segs / 2), thick * 2.6, 14, false);
        var haloMat = new THREE.MeshBasicMaterial({
          color: pal.glow, transparent: true,
          opacity: 0.10 * TWEAKS.glow,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        bundle.halo = new THREE.Mesh(haloGeo, haloMat);
        group.add(bundle.halo); parts.push(bundle.halo);

        var N = Math.max(0, Math.round(TWEAKS.trail));
        for (var i = 1; i <= N; i++) {
          var t   = i / (N + 1);
          var r   = thick * (1 - t * 0.45);
          var gGeo = new THREE.TubeGeometry(stroke.curve, Math.max(180, stroke.segs / 2), r, 12, false);
          var gMat = new THREE.MeshStandardMaterial({
            color: pal.primary.clone().lerp(pal.deep, 0.3 + t * 0.5),
            roughness: 0.5, metalness: 0.2,
            transparent: true, opacity: 0.55 * (1 - t * 0.6),
            emissive: pal.deep, emissiveIntensity: 0.2 * (1 - t) * TWEAKS.glow
          });
          var m = new THREE.Mesh(gGeo, gMat);
          m.position.z = -i * 0.18;
          group.add(m); parts.push(m); bundle.ghosts.push(m);
        }
        return bundle;
      }

      function buildParticles() {
        var Pcount = Math.max(0, Math.round(TWEAKS.particles));
        if (Pcount === 0) return null;
        var pal   = palette();
        var thick = TWEAKS.thickness;
        var pGeo  = new THREE.BufferGeometry();
        var positions  = new Float32Array(Pcount * 3);
        var seeds      = new Float32Array(Pcount);
        var radial     = new Float32Array(Pcount * 2);
        var strokeIdx  = new Uint8Array(Pcount);
        for (var i = 0; i < Pcount; i++) {
          seeds[i] = Math.random();
          var ang = Math.random() * Math.PI * 2;
          var rr  = (Math.random() * 0.6 + 0.2) * thick * 5;
          radial[i * 2]     = Math.cos(ang) * rr;
          radial[i * 2 + 1] = Math.sin(ang) * rr;
          strokeIdx[i] = (Math.random() < strokes[0].len / totalLen) ? 0 : 1;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        pGeo.userData = { seeds: seeds, radial: radial, strokeIdx: strokeIdx };

        var c   = document.createElement('canvas'); c.width = c.height = 64;
        var ctx = c.getContext('2d');
        var g   = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        g.addColorStop(0,    'rgba(255,232,170,1)');
        g.addColorStop(0.35, 'rgba(255,200,120,.7)');
        g.addColorStop(1,    'rgba(255,160,80,0)');
        ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
        var tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;

        var pMat = new THREE.PointsMaterial({
          size: thick * 0.9, map: tex, color: pal.particle,
          transparent: true, opacity: 0.85,
          blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
        });
        var pts = new THREE.Points(pGeo, pMat);
        group.add(pts); parts.push(pts);
        return pts;
      }

      function buildMark() {
        disposeAll();
        strokeBundles = strokes.map(buildStrokeBundle);
        particles = buildParticles();
        /* flow mode: keep only 1 ghost per stroke */
        strokeBundles.forEach(function(b) {
          b.ghosts.forEach(function(g, i) { g.visible = i < 1; });
        });
      }
      buildMark();

      /* ---- RESIZE — fit the hero-wz container ---- */
      function wzResize() {
        var w = stageEl.offsetWidth  || 400;
        var h = stageEl.offsetHeight || 400;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        var z = 8.4;
        camera.fov = camera.aspect < 0.9 ? 46 : 38;
        camera.position.set(0, 0, z);
        camera.userData.baseZ = z;
        camera.updateProjectionMatrix();
      }
      addEventListener('resize', wzResize);
      /* wait one frame so CSS has laid out the container */
      requestAnimationFrame(wzResize);


      /* ---- TICK ---- */
      var clock = new THREE.Clock();
      var tmp = new THREE.Vector3(), tmpT = new THREE.Vector3();
      var tmpN = new THREE.Vector3(), tmpB = new THREE.Vector3();

      function tick() {
        var dt   = clock.getDelta();
        var time = clock.elapsedTime;
        var spd  = TWEAKS.speed;

        /* pure sine rotation — no mouse influence */
        var rot = TWEAKS.rotation;
        group.rotation.y = Math.sin(time * spd * 0.45) * (0.55 * rot);
        group.rotation.x = Math.sin(time * spd * 0.30 + 1.0) * (0.22 * rot);
        group.rotation.z = Math.sin(time * spd * 0.22 + 2.0) * 0.04;

        /* seamless draw loop — draws forward, restarts immediately at end */
        var cycleDur = 7.0;
        var phase    = ((time * spd) % cycleDur) / cycleDur;
        var visStart = 0, visEnd = phase;

        function applyDrawRange(mesh, s, e) {
          if (!mesh || !mesh.visible) return;
          var idx = mesh.geometry.index;
          if (!idx) return;
          var total = idx.count;
          var a = Math.floor(s * total), b = Math.floor(e * total);
          mesh.geometry.setDrawRange(a, Math.max(0, b - a));
        }
        function localRange(stroke, gs, ge) {
          var span = stroke.gEnd - stroke.gStart;
          var s = Math.max(0, Math.min(1, (gs - stroke.gStart) / span));
          var e = Math.max(0, Math.min(1, (ge - stroke.gStart) / span));
          return [s, e];
        }
        strokeBundles.forEach(function(b) {
          var lr = localRange(b.stroke, visStart, visEnd);
          applyDrawRange(b.main, lr[0], lr[1]);
          applyDrawRange(b.halo, Math.max(0, lr[0] - 0.02), Math.min(1, lr[1] + 0.02));
          b.ghosts.forEach(function(g, i) {
            var lag = (i + 1) * 0.04;
            applyDrawRange(g, Math.max(0, lr[0] - lag), Math.max(0, lr[1] - lag));
          });
        });

        /* traveling light */
        var head = visEnd > 0.001 ? Math.min(0.9999, visEnd) : 0;
        if (head > 0) {
          var active = strokeBundles[strokeBundles.length - 1];
          for (var si = 0; si < strokeBundles.length; si++) {
            if (head >= strokeBundles[si].stroke.gStart && head <= strokeBundles[si].stroke.gEnd) {
              active = strokeBundles[si]; break;
            }
          }
          var localT = (head - active.stroke.gStart) / (active.stroke.gEnd - active.stroke.gStart);
          active.stroke.curve.getPointAt(Math.max(0, Math.min(1, localT)), tmp);
          tmp.applyMatrix4(group.matrixWorld);
          travel.position.copy(tmp);
          travel.intensity = (phase < 0.45 ? 1.4 : phase < 0.65 ? 0.9 : 0.2) * TWEAKS.glow;
        } else {
          travel.intensity = 0;
        }

        /* particles */
        if (particles) {
          var pos = particles.geometry.attributes.position.array;
          var ud  = particles.geometry.userData;
          var count = ud.seeds.length;
          var flowSpeed = 0.07 * spd;
          for (var i = 0; i < count; i++) {
            var stroke = strokes[ud.strokeIdx[i]];
            var u  = (ud.seeds[i] + time * flowSpeed) % 1;
            var span2 = stroke.gEnd - stroke.gStart;
            var ls = Math.max(0, Math.min(1, (visStart - stroke.gStart) / span2));
            var le = Math.max(0, Math.min(1, (visEnd   - stroke.gStart) / span2));
            if (u < ls - 0.02 || u > le + 0.02) {
              pos[i*3] = 9999; pos[i*3+1] = 9999; pos[i*3+2] = 9999; continue;
            }
            stroke.curve.getPointAt(u, tmpT);
            stroke.curve.getTangentAt(u, tmpN);
            tmpB.set(0, 0, 1).cross(tmpN).normalize();
            tmpN.copy(tmpB).cross(stroke.curve.getTangentAt(u)).normalize();
            pos[i*3]   = tmpT.x + tmpB.x * ud.radial[i*2]   + tmpN.x * ud.radial[i*2+1];
            pos[i*3+1] = tmpT.y + tmpB.y * ud.radial[i*2]   + tmpN.y * ud.radial[i*2+1];
            pos[i*3+2] = tmpT.z + tmpB.z * ud.radial[i*2]   + tmpN.z * ud.radial[i*2+1];
          }
          particles.geometry.attributes.position.needsUpdate = true;
          particles.material.opacity = 0.7 + Math.sin(time * 1.6) * 0.15;
        }

        /* gentle camera breathing */
        if (camera.userData.baseZ != null) {
          camera.position.z = camera.userData.baseZ + Math.sin(time * 0.22) * 0.05;
        }

        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      }
      tick();

      /* ---- THEME HOOK ---- */
      window.wzApplyTheme = function(theme) {
        TWEAKS.theme = theme;
        var dark = theme === 'dark';
        amb.intensity    = dark ? 0.45 : 0.65;
        key.color.set(dark ? 0xffd58a : 0xffcf88); key.intensity = dark ? 1.6 : 1.0;
        rim.color.set(dark ? 0xb88040 : 0x8a5a20); rim.intensity = dark ? 0.9 : 0.7;
        travel.color.set(dark ? 0xffe0a0 : 0xffc070);
        buildMark();
      };
      /* init with current page theme */
      wzApplyTheme(localStorage.getItem('theme') || 'light');

    }());

    /* ==========================================
       MENU DROPDOWN
    ========================================== */
    var menuOpen = false;

    function openMenu() {
      menuOpen = true;
      hamburger.classList.add('open');
      hamburger.setAttribute('aria-expanded', 'true');
      menuOverlay.classList.add('is-open');
      menuOverlay.setAttribute('aria-hidden', 'false');

      gsap.to(menuOverlay, {
        opacity: 1,
        y: 0,
        scale: 1,
        duration: 0.22,
        ease: 'power2.out'
      });
    }

    function closeMenu() {
      menuOpen = false;
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');

      gsap.to(menuOverlay, {
        opacity: 0,
        y: -8,
        scale: 0.97,
        duration: 0.18,
        ease: 'power2.in',
        onComplete: function () {
          menuOverlay.classList.remove('is-open');
          menuOverlay.setAttribute('aria-hidden', 'true');
        }
      });
    }

    hamburger.addEventListener('click', function (e) {
      e.stopPropagation();
      if (menuOpen) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    // Close on outside click
    document.addEventListener('click', function (e) {
      if (menuOpen && !menuOverlay.contains(e.target) && e.target !== hamburger) {
        closeMenu();
      }
    });

    // Close on overlay link click
    menuOverlay.querySelectorAll('.ol-link').forEach(function (a) {
      a.addEventListener('click', function () {
        closeMenu();
      });
    });

    // Close on Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && menuOpen) {
        closeMenu();
      }
    });

    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        var target = document.querySelector(this.getAttribute('href'));
        if (target) {
          e.preventDefault();
          if (lenis) {
            lenis.scrollTo(target, { offset: -80, duration: 1.4 });
          } else {
            target.scrollIntoView({ behavior: 'smooth' });
          }
        }
      });
    });

    /* ==========================================
       DEVICE SHOWCASE — HORIZONTAL PIN SCROLL
    ========================================== */
    (function() {
      var isMobile = window.innerWidth < 768;
      if (isMobile) {
        [0, 1, 2].forEach(function(i) {
          gsap.from('#panel' + i, {
            scrollTrigger: { trigger: '#panel' + i, start: 'top 80%' },
            opacity: 0, y: 40, duration: 0.8, ease: 'power3.out'
          });
        });
        return;
      }

      var track   = document.getElementById('showcaseTrack');
      var section = document.getElementById('projects');
      var dots    = [
        document.getElementById('spDot0'),
        document.getElementById('spDot1'),
        document.getElementById('spDot2')
      ];

      gsap.set(['#devWrap0', '#devWrap1', '#devWrap2'], { rotateX: 28, rotateY: -12, scale: 0.82, opacity: 0 });

      gsap.to(track, {
        x: function() { return -(track.scrollWidth - window.innerWidth); },
        ease: 'none',
        scrollTrigger: {
          trigger: section,
          pin: true,
          scrub: 1,
          snap: {
            snapTo: 1 / 2,
            duration: { min: 0.3, max: 0.5 },
            ease: 'power2.inOut'
          },
          end: function() { return '+=' + track.scrollWidth; },
          onUpdate: function(self) {
            var prog = self.progress;
            var active = prog < 0.33 ? 0 : prog < 0.66 ? 1 : 2;
            dots.forEach(function(d, i) {
              if (d) d.classList.toggle('active', i === active);
            });

            var p0 = Math.min(1, prog / 0.2);
            gsap.set('#devWrap0', { rotateX: 28 * (1 - p0), rotateY: -12 * (1 - p0), scale: 0.82 + 0.24 * p0, opacity: p0 });
            gsap.set('#craftScroll', { y: -Math.max(0, (p0 - 0.5) / 0.5) * 25 + '%' });

            var p1 = Math.min(1, Math.max(0, (prog - 0.30) / 0.25));
            gsap.set('#devWrap1', { rotateX: 28 * (1 - p1), rotateY: -12 * (1 - p1), scale: 0.82 + 0.24 * p1, opacity: p1 });
            gsap.set('#dentalScroll', { y: -Math.max(0, (p1 - 0.5) / 0.5) * 25 + '%' });

            var p2 = Math.min(1, Math.max(0, (prog - 0.62) / 0.23));
            gsap.set('#devWrap2', { rotateX: 28 * (1 - p2), rotateY: -12 * (1 - p2), scale: 0.82 + 0.24 * p2, opacity: p2 });
            gsap.set('#restoScroll', { y: -Math.max(0, (p2 - 0.5) / 0.5) * 25 + '%' });
          }
        }
      });

      gsap.to('#projectsLabel', {
        scrollTrigger: { trigger: section, start: 'top 80%' },
        opacity: 1, y: 0, duration: 0.6, ease: 'power3.out'
      });
      gsap.to('#projectsHeadline', {

        opacity: 1, y: 0, duration: 0.7, ease: 'power3.out', delay: 0.1
      });
      gsap.to('#projectsNote', {
        scrollTrigger: { trigger: section, start: 'top 75%' },
        opacity: 1, y: 0, duration: 0.7, ease: 'power3.out', delay: 0.2
      });

      window.addEventListener('resize', function() {
        ScrollTrigger.refresh();
      }, { passive: true });
    }());

    /* ==========================================

    ========================================== */
    (function() {
      var banner = document.getElementById('consentBanner');
      var textEl = document.getElementById('consentText');
      var okBtn  = document.getElementById('consentOk');
      if (!banner || localStorage.getItem('consent') === '1') return;

      var texts = {
        de: {
          msg: 'Wir verwenden keine Tracking-Cookies. Formulardaten werden von <a href="legal/datenschutz.html">Netlify verarbeitet</a>.',
          ok: 'Verstanden'
        },
        en: {
          msg: 'We use no tracking cookies. Form data is <a href="legal/datenschutz.html">processed by Netlify</a>.',
          ok: 'Got it'
        }
      };

      function updateBannerLang(l) {
        var t = texts[l] || texts.de;
        textEl.innerHTML = t.msg;
        okBtn.textContent = t.ok;
      }

      var currentLang = localStorage.getItem('lang') || 'de';
      updateBannerLang(currentLang);

      var origRender = render;
      render = function(l) {
        origRender(l);
        updateBannerLang(l);
      };

      gsap.set(banner, { y: '100%', opacity: 0 });
      gsap.to(banner, {
        y: 0,
        opacity: 1,
        duration: 0.5,
        ease: 'power3.out',
        delay: 1.5
      });

      okBtn.addEventListener('click', function() {
        localStorage.setItem('consent', '1');
        gsap.to(banner, {
          y: '100%',
          opacity: 0,
          duration: 0.35,
          ease: 'power2.in',
          onComplete: function() { banner.remove(); }
        });
      });
    }());
